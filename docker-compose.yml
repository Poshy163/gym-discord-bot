services:
  gym-bot:
    build: .
    image: gym-discord-bot:latest
    container_name: gym-discord-bot
    restart: unless-stopped
    env_file:
      - .env
    # Strava OAuth callback + webhook server (app/strava_web.py). Only needed
    # when the Strava integration is enabled; front it with a reverse proxy for
    # public HTTPS so STRAVA_PUBLIC_URL resolves to it. Adjust the host port to
    # match STRAVA_PORT if you change it.
    ports:
      - "8080:8080"
      # Operator web dashboard (app/webui.py). Only needed when WEBUI_PASSWORD
      # is set; keep it behind a reverse proxy / VPN since it exposes member
      # data. Match the host port to WEBUI_PORT if you change it.
      - "8081:8081"
    volumes:
      - gym-data:/data
      # Real disaster recovery: bind-mount the backup folder to the host so the
      # nightly snapshots survive losing the gym-data volume. Uncomment this and
      # set BACKUP_DIR=/data/backups in .env, then sync ./backups off-box (e.g.
      # a cron running `rclone sync ./backups remote:gym-backups` or restic).
      # The nightly job verifies each snapshot with PRAGMA integrity_check and
      # logs an error if one is unreadable. NOTE: snapshots contain Fernet
      # *ciphertext* only — back up your .env (the *_FERNET_KEY values) SEPARATELY
      # or the encrypted Strava/Hevy/Revo credentials are unrecoverable.
      # - ./backups:/data/backups
    # The bot has no HTTP surface, so health is "can we still open the SQLite
    # store?". Cheap and detects volume / disk issues early.
    healthcheck:
      test: ["CMD", "python", "-c", "import sqlite3, os; sqlite3.connect(os.getenv('DB_PATH', '/data/gym.sqlite3')).execute('SELECT 1')"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  gym-data:
